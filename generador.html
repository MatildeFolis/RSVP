<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generador de links — InvitArte</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Karla:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Karla', sans-serif;
    background: #E8E2D5;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    background: #fff;
    border-radius: 20px;
    padding: 48px 40px;
    max-width: 480px;
    width: 100%;
    box-shadow: 0 20px 48px -12px rgba(95,88,77,0.18);
  }
  .eyebrow {
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #788F6E;
    font-weight: 700;
    margin-bottom: 10px;
  }
  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 32px;
    font-weight: 500;
    color: #5F584D;
    margin-bottom: 32px;
    line-height: 1.2;
  }
  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #3A352D;
    margin-bottom: 8px;
  }
  input {
    width: 100%;
    padding: 13px 16px;
    border: 1px solid #D6CCB8;
    border-radius: 10px;
    font-size: 16px;
    font-family: 'Karla', sans-serif;
    color: #3A352D;
    outline: none;
    transition: border 0.15s;
    margin-bottom: 24px;
  }
  input:focus { border-color: #9CAF93; }
  .btn {
    width: 100%;
    padding: 15px;
    background: #788F6E;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-family: 'Karla', sans-serif;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: background 0.15s;
  }
  .btn:hover { background: #5F584D; }
  .result {
    display: none;
    margin-top: 28px;
    padding: 20px;
    background: #F4F9F2;
    border: 1px solid #C3D0BC;
    border-radius: 12px;
  }
  .result-label {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #788F6E;
    margin-bottom: 10px;
  }
  .result-url {
    font-size: 13px;
    color: #3A352D;
    word-break: break-all;
    line-height: 1.5;
    margin-bottom: 16px;
    background: #fff;
    border: 1px solid #D6CCB8;
    border-radius: 8px;
    padding: 12px;
  }
  .copy-btn {
    width: 100%;
    padding: 12px;
    background: #9CAF93;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-family: 'Karla', sans-serif;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s;
  }
  .copy-btn:hover { background: #788F6E; }
  .copy-btn.copiado { background: #4A7C59; }
  .divider { height: 1px; background: #E8E2D5; margin: 24px 0; }
  .nota {
    font-size: 12px;
    color: #8B8378;
    line-height: 1.5;
  }
</style>
</head>
<body>
<div class="card">
  <p class="eyebrow">InvitArte</p>
  <h1>Generador de links RSVP</h1>

  <label for="nombre">Nombre de la clienta o evento</label>
  <input
    type="text"
    id="nombre"
    placeholder="Ej: Sol y Pedro, Quince Sofía..."
    oninput="limpiarResultado()"
    onkeydown="if(event.key==='Enter') generar()"
  >

  <button class="btn" onclick="generar()">Generar link</button>

  <div class="result" id="result">
    <p class="result-label">Link para invitados — va en la invitación de Canva</p>
    <div class="result-url" id="result-url-invitado"></div>
    <button class="copy-btn" id="copy-btn-invitado" onclick="copiar('invitado')">📋 Copiar link de invitados</button>

    <div class="divider"></div>

    <p class="result-label">Link del panel — para la clienta y para vos</p>
    <div class="result-url" id="result-url-panel"></div>
    <button class="copy-btn" id="copy-btn-panel" onclick="copiar('panel')">📋 Copiar link del panel</button>

    <div class="divider"></div>
    <p class="nota">
      El link de invitados muestra solo el formulario. El link del panel muestra también Gestión y Configurar.
    </p>
  </div>
</div>

<script>
const BASE = "https://matildefolis.github.io/RSVP/?evento=";

function toCode(nombre) {
  return nombre
    .toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
    .replace(/[^a-z0-9\s-]/g, "")
    .trim()
    .replace(/\s+/g, "-");
}

function generar() {
  const nombre = document.getElementById("nombre").value.trim();
  if (!nombre) { document.getElementById("nombre").focus(); return; }
  const codigo = toCode(nombre);
  document.getElementById("result-url-invitado").textContent = BASE + codigo + "&modo=invitado";
  document.getElementById("result-url-panel").textContent = BASE + codigo;
  document.getElementById("result").style.display = "block";
  document.getElementById("copy-btn-invitado").textContent = "📋 Copiar link de invitados";
  document.getElementById("copy-btn-invitado").className = "copy-btn";
  document.getElementById("copy-btn-panel").textContent = "📋 Copiar link del panel";
  document.getElementById("copy-btn-panel").className = "copy-btn";
}

function copiar(tipo) {
  const id = tipo === "invitado" ? "result-url-invitado" : "result-url-panel";
  const btnId = tipo === "invitado" ? "copy-btn-invitado" : "copy-btn-panel";
  const url = document.getElementById(id).textContent;
  navigator.clipboard.writeText(url).then(() => {
    const btn = document.getElementById(btnId);
    btn.textContent = "✓ Copiado";
    btn.className = "copy-btn copiado";
    setTimeout(() => {
      btn.textContent = tipo === "invitado" ? "📋 Copiar link de invitados" : "📋 Copiar link del panel";
      btn.className = "copy-btn";
    }, 2000);
  });
}

function limpiarResultado() {
  document.getElementById("result").style.display = "none";
}
</script>
</body>
</html>
